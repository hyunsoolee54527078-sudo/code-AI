<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft 3D</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// 기본 씬
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// 카메라
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

// 렌더러
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 빛
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// 블록 생성 함수
function createBlock(x, y, z, color=0x00aa00) {
  const geo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshStandardMaterial({ color });
  const cube = new THREE.Mesh(geo, mat);
  cube.position.set(x,y,z);
  scene.add(cube);
}

// 바닥 만들기
for(let x=-10; x<10; x++){
  for(let z=-10; z<10; z++){
    createBlock(x, 0, z, 0x228B22);
  }
}

// 랜덤 블록
for(let i=0; i<50; i++){
  createBlock(
    Math.floor(Math.random()*20-10),
    1,
    Math.floor(Math.random()*20-10),
    0x8B4513
  );
}

// 이동
const keys = {};
window.addEventListener("keydown", e => keys[e.key]=true);
window.addEventListener("keyup", e => keys[e.key]=false);

// 마우스 시점
let yaw = 0, pitch = 0;
document.addEventListener("mousemove", e => {
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

// 포인터 락
document.body.onclick = () => {
  document.body.requestPointerLock();
};

// 애니메이션
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  if(keys["w"]) camera.position.z -= speed * Math.cos(yaw);
  if(keys["s"]) camera.position.z += speed * Math.cos(yaw);
  if(keys["a"]) camera.position.x -= speed * Math.cos(yaw);
  if(keys["d"]) camera.position.x += speed * Math.cos(yaw);

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  renderer.render(scene, camera);
}

animate();

// 리사이즈 대응
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
